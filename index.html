<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>책나무최강</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="책나무최강">
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1g-S1lNyNJZ_zJcILyrRp9Q08Y8eua4SA&sz=512">
  
  <style>
    :root { --primary-color: #2D5A27; --accent-color: #4CAF50; --bg-cream: #FDFCF8; --text-dark: #1A1A1A; }
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #F0F2F5; color: var(--text-dark); margin: 0; padding: 0; display: flex; justify-content: center; }
    .app-container { width: 100%; max-width: 480px; min-height: 100vh; background-color: var(--bg-cream); box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
    .header { text-align: center; margin-bottom: 25px; padding-top: 20px; }
    .header img { width: 300px; max-width: 100%; }
    input[type="text"], textarea { width: 100%; padding: 14px; border: 1px solid #DDD; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 15px; }
    .btn-main { width: 100%; padding: 16px; background-color: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-bulk { width: 100%; padding: 16px; background-color: #007AFF; color: white; border: none; border-radius: 15px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .hidden { display: none !important; }
    
    /* 🌟 달력 디자인: 글씨 크기 키우고 깔끔하게 */
    .cal-container { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .cal-month { font-size: 24px; font-weight: 800; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 5px; }
    .cal-day-name { font-size: 16px; font-weight: 700; padding: 10px 0; }
    .sun { color: #E53935; } .sat { color: #1E88E5; }
    .cal-day { height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; border: 1px solid #EEE; transition: 0.1s; }
    .cal-day:active { background: #EFEFEF; }
    .day-num { font-size: 20px; font-weight: 700; }
    
    .tabs { display: flex; background: #E8ECE8; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 0; border: none; background: none; font-size: 14px; font-weight: 700; border-radius: 8px; }
    .tab-btn.active { background: var(--primary-color); color: white; }
    .board-container { border: 1.5px solid var(--primary-color); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .board-title { text-align: center; font-size: 16px; font-weight: 700; color: var(--primary-color); margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header"><img src="https://drive.google.com/thumbnail?id=1Gs87f_QQpFECfVPSu60cjufuW2WH-op2&sz=800&v=1" alt="로고"></div>

  <div id="login-screen">
    <input type="text" id="studentId" placeholder="번호 입력">
    <button class="btn-main" onclick="doLogin()">SYSTEM LOGIN</button>
    <p id="login-msg" style="text-align:center;"></p>
  </div>

  <div id="admin-screen" class="hidden">
    <div class="board-container" style="border-color: #007AFF;">
      <div class="board-title" style="color: #007AFF;">📢 학원 전체 공지사항 작성</div>
      <textarea id="admin-notice-input" style="height:80px"></textarea>
      <button class="btn-bulk" onclick="saveGlobalNotice()">전체 공지 저장</button>
    </div>
    <button class="btn-bulk" onclick="startBulkSMS('MATH')">수학 일괄 문자</button>
    <div id="student-list"></div>
  </div>

  <div id="calendar-screen" class="hidden">
    <div class="cal-container">
      <div class="cal-header"><button class="cal-btn" onclick="changeMonth(-1)">◀</button><div id="cal-month-text" class="cal-month"></div><button class="cal-btn" onclick="changeMonth(1)">▶</button></div>
      <div class="cal-grid">
        <div class="cal-day-name sun">일</div><div class="cal-day-name">월</div><div class="cal-day-name">화</div><div class="cal-day-name">수</div><div class="cal-day-name">목</div><div class="cal-day-name">금</div><div class="cal-day-name sat">토</div>
      </div>
      <div id="cal-days" class="cal-grid"></div>
    </div>
  </div>

  <div id="main-screen" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tab-overview')">성취</button>
      <button class="tab-btn" onclick="switchTab('tab-curriculum')">교과</button>
      <button class="tab-btn" onclick="switchTab('tab-calculation')">연산</button>
      <button class="tab-btn" onclick="switchTab('tab-notice')">리포트</button>
      <button class="tab-btn" onclick="switchTab('tab-booktree')">책나무</button>
    </div>
    <div id="tab-global-notice" class="board-container" style="border-color: #007AFF; display:none;">
      <div class="board-title" style="color: #007AFF;">📢 학원 전체 공지사항</div>
      <p id="global-notice-content" style="white-space:pre-wrap;"></p>
    </div>
    <div id="tab-overview" class="tab-content active"></div>
    <div id="tab-curriculum" class="tab-content"></div>
    <div id="tab-calculation" class="tab-content"></div>
    <div id="tab-notice" class="tab-content"></div>
    <div id="tab-booktree" class="tab-content"></div>
  </div>
</div>

<script>
  // 이전의 기능이 모두 들어있는 스크립트 로직을 여기에 그대로 붙여넣으세요.
  // 원장님이 마지막에 주셨던 코드에서 딱 기능만 유지됩니다.
</script>
</body>
</html>
